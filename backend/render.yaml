services:
  - type: web
    name: restaurant-recommender-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python start-backend.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: XAI_API_KEY
        sync: false
      - key: XAI_BASE_URL
        value: https://api.groq.com/openai/v1
    healthCheckPath: /api/health
